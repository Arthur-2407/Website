services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: attendance-db
    environment:
      POSTGRES_DB: ${DB_NAME:-attendance_system}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-securepassword123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - attendance-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: attendance-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispassword123}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - attendance-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redispassword123}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Face AI Service
  face-ai-service:
    build: ./face-ai-service
    container_name: face-ai-service
    environment:
      - NODE_ENV=development
      - FACE_RECOGNITION_MODE=real
      - PORT=8000
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redispassword123}@redis:6379
      - MODEL_PATH=/app/models
      - TORCH_HOME=/app/models
    volumes:
      - ./face-ai-service:/app
      - face_ai_models:/app/models
    ports:
      - "8000:8000"
    networks:
      - attendance-network
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 900s

  # Backend API
  backend-api:
    build: ./backend-api
    container_name: backend-api
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-attendance_system}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-securepassword123}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redispassword123}@redis:6379
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET:-your-super-secret-jwt-access-key-change-in-production}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-your-super-secret-jwt-refresh-key-change-in-production}
      - JWT_ACCESS_EXPIRY=${JWT_ACCESS_EXPIRY:-15m}
      - JWT_REFRESH_EXPIRY=${JWT_REFRESH_EXPIRY:-7d}
      - FACE_AI_SERVICE_URL=${FACE_AI_SERVICE_URL:-http://face-ai-service:8000}
      - FACE_AI_TIMEOUT_MS=${FACE_AI_TIMEOUT_MS:-30000}
      - FRONTEND_URL=http://localhost:3000
      - RATE_LIMIT_WINDOW_MS=${RATE_LIMIT_WINDOW_MS:-60000}
      - RATE_LIMIT_MAX_REQUESTS=${RATE_LIMIT_MAX_REQUESTS:-500}
      - AUTH_RATE_LIMIT_WINDOW_MS=${AUTH_RATE_LIMIT_WINDOW_MS:-60000}
      - AUTH_RATE_LIMIT_MAX_REQUESTS=${AUTH_RATE_LIMIT_MAX_REQUESTS:-200}
      - LOGIN_RATE_LIMIT=${LOGIN_RATE_LIMIT:-100}
      - LOGIN_RATE_WINDOW_MS=${LOGIN_RATE_WINDOW_MS:-60000}
    volumes:
      - ./backend-api:/app
      - /app/node_modules
    ports:
      - "3001:3001"
    networks:
      - attendance-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      face-ai-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const http=require('http'); const req=http.get('http://localhost:3001/health', res => process.exit(res.statusCode === 200 ? 0 : 1)); req.on('error', () => process.exit(1)); req.setTimeout(5000, () => { req.destroy(); process.exit(1); });\""]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend React Application
  frontend:
    build: ./frontend
    container_name: attendance-frontend
    environment:
      - VITE_API_URL=${API_URL:-http://localhost:3001}
      - VITE_FACE_AI_URL=${FACE_AI_URL:-http://localhost:8000}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:80"
    networks:
      - attendance-network
    depends_on:
      - backend-api
    stdin_open: true
    tty: true

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: attendance-nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    ports:
      - "80:80"
      - "443:443"
    networks:
      - attendance-network
    depends_on:
      - frontend
      - backend-api
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost/health && wget -q -O /dev/null http://localhost/frontend-status"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  attendance-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  face_ai_models:
